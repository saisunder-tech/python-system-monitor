apiVersion: apps/v1
kind: Deployment

metadata:
  name: python-monitor

spec:
  replicas: 1

  selector:
    matchLabels:
      app: python-monitor

  template:
    metadata:
      labels:
        app: python-monitor

    spec:
      containers:
      - name: python-monitor
        image: saisundertech/python-system-monitor:latest
        imagePullPolicy: Always

        env:
        - name: CPU_THRESHOLD
          value: "80"

        - name: MONITOR_INTERVAL
          value: "10"

        - name: LOG_LEVEL
          value: "INFO"

        - name: LOG_FILE
          value: "system.log"
